spring:
  application:
    name: a2a-agents
  ai:
    azure:
      openai:
        api-key: ${OPENAI_KEY:}
        endpoint: ${AZURE_OPENAI_ENDPOINT:https://wsscpmqasopenaisweden.openai.azure.com}
        chat:
          options:
            deployment-name: ${AZURE_OPENAI_CHAT_DEPLOYMENT_NAME:gpt-4o}
            max-tokens: ${AZURE_OPENAI_MAX_TOKENS:4096}
            temperature: ${AZURE_OPENAI_TEMPERATURE:0.7}

# Agent identity (used in system prompt)
agent:
  model: ${AZURE_OPENAI_CHAT_DEPLOYMENT_NAME:gpt-4o}

# Web search for InfoFetchAgent (Tavily)
tavily:
  api-key: ${TAVILY_API_KEY:}

server:
  port: 3030
