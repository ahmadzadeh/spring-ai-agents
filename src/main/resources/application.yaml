spring:
  application:
    name: agents-demo
  ai:
    azure:
      openai:
        api-key: ${OPENAI_KEY:}
        endpoint: ${AZURE_OPENAI_ENDPOINT:https://wsscpmqasopenaisweden.openai.azure.com}
        chat:
          options:
            deployment-name: ${AZURE_OPENAI_CHAT_DEPLOYMENT_NAME:gpt-4o}
            max-tokens: ${AZURE_OPENAI_MAX_TOKENS:4096}
            temperature: ${AZURE_OPENAI_TEMPERATURE:0.7}

# Agent identity (used in system prompt)
agent:
  model: ${AZURE_OPENAI_CHAT_DEPLOYMENT_NAME:gpt-4o}
  "model.knowledge.cutoff": "2025-01-01"
  # Optional: agent skills (list of classpath or file paths to skill Markdown files)
  # skills:
  #   paths: classpath:/skills/

# Optional: for BraveWebSearchTool (web search)
# brave.api-key: ${BRAVE_API_KEY:}

server:
  port: 2020